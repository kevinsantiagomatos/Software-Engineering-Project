<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Policy Acknowledgment</title>
    <link rel="stylesheet" href="/style/log_in.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
      body { background:#f4f5f7; margin:0; font-family: 'Inter', system-ui, -apple-system, sans-serif; }
      .page { max-width: 1000px; margin: 24px auto 34px; padding: 0 14px; }
      .hero {
        background: linear-gradient(120deg, #0d266f, #12349a 72%, #2445b8);
        color: #fff;
        border-radius: 18px;
        box-shadow: 0 16px 32px rgba(15, 47, 147, 0.25);
        padding: 18px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 14px;
        flex-wrap: wrap;
      }
      .hero h1 { margin: 0; font-size: 1.32rem; }
      .hero p { margin: 6px 0 0; font-size: 0.93rem; color: #d6e3ff; }
      .hero a {
        color: #eef4ff;
        text-decoration: none;
        border: 1px solid rgba(255, 255, 255, 0.25);
        border-radius: 10px;
        padding: 8px 12px;
        font-size: 0.9rem;
      }
      .container { max-width:800px; margin:14px auto 0; padding:0 16px; }
      .card { background:#fff; border-radius:16px; box-shadow:0 10px 30px rgba(0,0,0,0.08); padding:20px; margin-bottom:16px; }
      .list { list-style:none; padding:0; margin:0; }
      .list li { padding:10px 0; border-bottom:1px solid #e5e7eb; display:flex; justify-content:space-between; gap:12px; align-items:center; }
      .viewer { border:1px solid #e5e7eb; border-radius:12px; overflow:hidden; background:#111827; color:#fff; }
      .viewer-toolbar { display:flex; align-items:center; gap:8px; padding:8px 12px; background:#0b3c99; }
      .viewer-toolbar button { border:none; background:#0f172a; color:#fff; padding:6px 10px; border-radius:6px; cursor:pointer; }
      .viewer-toolbar button:disabled { opacity:0.4; cursor:not-allowed; }
      .viewer-canvas { display:block; width:100%; background:#1f2937; }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <div>
          <h1>Policy Acknowledgment</h1>
          <p>Review company policies and submit your signature acknowledgment for each required policy document.</p>
        </div>
        <a href="/dashboard.html">Back to dashboard</a>
      </section>

    <div class="container">
      <h2>Policy Acknowledgment</h2>
      <div class="card">
        <h3 style="margin-top:0;">Preview</h3>
        <div class="viewer">
          <div class="viewer-toolbar">
            <button id="prevPage">← Prev</button>
            <button id="nextPage">Next →</button>
            <a id="openPdf" href="#" target="_blank" rel="noopener" style="color:#fff; text-decoration:none; padding:6px 10px; border-radius:6px; background:#0f172a;">Open</a>
            <a id="downloadPdf" href="#" style="color:#fff; text-decoration:none; padding:6px 10px; border-radius:6px; background:#0f172a;">Download</a>
            <span id="pageLabel" style="margin-left:auto; font-weight:600;"></span>
          </div>
          <canvas id="pdfCanvas" class="viewer-canvas"></canvas>
        </div>
        <div class="muted" id="previewStatus" style="margin-top:8px;"></div>
      </div>
      <div class="card">
        <div class="controls" style="margin-bottom:12px;">
          <div id="emailBadge" class="muted" style="padding:10px 12px; background:#f8fafc; border:1px solid #e2e8f0; border-radius:10px; min-width:240px;">
            Signed in as: --
          </div>
          <input id="signature" class="text-input" type="text" placeholder="Type your name as signature" />
          <select id="policy" class="text-input">
            <option value="code_of_conduct">Code of Conduct</option>
            <option value="privacy">Privacy Policy</option>
            <option value="handbook">Employee Handbook</option>
            <option value="company_policies">Company Policies (placeholder)</option>
            <option value="medical_plan">Medical Plan Policy (placeholder)</option>
            <option value="billing_manual">Billing Manual (placeholder)</option>
          </select>
          <button id="sign" class="submit-button" style="padding:10px 16px;">Sign</button>
        </div>
        <div id="status" class="muted"></div>
      </div>
      <div class="card">
        <h3>Your signatures</h3>
        <ul id="list" class="list"></ul>
      </div>
    </div>
    </main>
    <script>
      const emailBadge = document.getElementById("emailBadge");
      const signatureInput = document.getElementById("signature");
      const policySelect = document.getElementById("policy");
      const signBtn = document.getElementById("sign");
      const statusEl = document.getElementById("status");
      const listEl = document.getElementById("list");
      const prevPageBtn = document.getElementById("prevPage");
      const nextPageBtn = document.getElementById("nextPage");
      const openPdfLink = document.getElementById("openPdf");
      const downloadPdfLink = document.getElementById("downloadPdf");
      const pageLabel = document.getElementById("pageLabel");
      const canvas = document.getElementById("pdfCanvas");
      const previewStatus = document.getElementById("previewStatus");
      let pdfDoc = null;
      let currentPage = 1;
      let csrfToken = null;
      let sessionEmail = "";

      const policyToUrl = {
        code_of_conduct: "/uploads/policies/company_policies.pdf",
        privacy: "/uploads/policies/privacy_policy.pdf",
        handbook: "/uploads/policies/company_policies.pdf",
        company_policies: "/uploads/policies/company_policies.pdf",
        medical_plan: "/uploads/policies/medical_plan_policy.pdf",
        billing_manual: "/uploads/policies/billing_manual.pdf",
      };

      async function fetchJson(url, options) {
        const res = await fetch(url, options);
        if (!res.ok) throw new Error(await res.text());
        return res.json();
      }

      async function ensureCsrf() {
        if (csrfToken) return csrfToken;
        const data = await fetchJson("/api/csrf");
        csrfToken = data.csrf_token;
        return csrfToken;
      }

      async function loadStatus() {
        try {
          const data = await fetchJson("/api/policy/status");
          const items = data.policies || [];
          listEl.innerHTML = items.length
            ? items.map(p => `<li><span>${p.policy_id}</span><span>${p.status}</span></li>`).join("")
            : "<li>No signatures yet.</li>";
        } catch (err) {
          statusEl.textContent = err.message;
        }
      }

      signBtn.addEventListener("click", async () => {
        statusEl.textContent = "";
        const sig = signatureInput.value.trim();
        const policy = policySelect.value;
        if (!sig) {
          statusEl.textContent = "Signature is required.";
          return;
        }
        try {
          const token = await ensureCsrf();
          await fetchJson("/api/policy/ack", {
            method: "POST",
            headers: {
              "Content-Type": "application/x-www-form-urlencoded",
              "X-CSRF-Token": token,
            },
            body: new URLSearchParams({ signature: sig, policy_id: policy })
          });
          statusEl.textContent = "Signed.";
          signatureInput.value = "";
          loadStatus();
        } catch (err) {
          statusEl.textContent = err.message;
        }
      });

      async function loadPdf(policyId) {
        const url = policyToUrl[policyId] || policyToUrl.company_policies;
        openPdfLink.href = url;
        downloadPdfLink.href = `${url}${url.includes("?") ? "&" : "?"}download=1`;
        previewStatus.textContent = "Loading preview...";
        currentPage = 1;
        try {
          pdfDoc = await pdfjsLib.getDocument(url).promise;
          renderPage(currentPage);
        } catch (err) {
          previewStatus.textContent = "Unable to load PDF preview.";
          pdfDoc = null;
          pageLabel.textContent = "";
          const ctx = canvas.getContext("2d");
          ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
      }

      async function renderPage(pageNum) {
        if (!pdfDoc) return;
        const page = await pdfDoc.getPage(pageNum);
        const viewport = page.getViewport({ scale: 1.2 });
        const context = canvas.getContext("2d");
        canvas.height = viewport.height;
        canvas.width = viewport.width;
        await page.render({ canvasContext: context, viewport }).promise;
        pageLabel.textContent = `Page ${pageNum} / ${pdfDoc.numPages}`;
        prevPageBtn.disabled = pageNum <= 1;
        nextPageBtn.disabled = pageNum >= pdfDoc.numPages;
        previewStatus.textContent = "";
      }

      prevPageBtn.addEventListener("click", () => {
        if (!pdfDoc || currentPage <= 1) return;
        currentPage -= 1;
        renderPage(currentPage);
      });

      nextPageBtn.addEventListener("click", () => {
        if (!pdfDoc || currentPage >= pdfDoc.numPages) return;
        currentPage += 1;
        renderPage(currentPage);
      });

      policySelect.addEventListener("change", () => loadPdf(policySelect.value));

      function prefillIdentity() {
        const email = new URLSearchParams(window.location.search).get("email") || localStorage.getItem("paoli_email");
        if (email) {
          sessionEmail = email.trim().toLowerCase();
          localStorage.setItem("paoli_email", sessionEmail);
          emailBadge.textContent = `Signed in as: ${sessionEmail}`;
        } else {
          emailBadge.textContent = "Signed in as: your current session";
        }
      }

      function prefill() {
        prefillIdentity();
        loadStatus();
        loadPdf(policySelect.value);
      }
      prefill();
    </script>
  </body>
</html>
