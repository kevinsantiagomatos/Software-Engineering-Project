<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Paoli Group | Account Submission</title>
    <link rel="stylesheet" href="/style/log_in.css" />
    <style>
      :root {
        --bg: #edf2f8;
        --panel: #ffffff;
        --line: #d7e2ef;
        --ink: #0f172a;
        --muted: #5b6475;
        --brand: #0f2f93;
        --good: #0f8a4d;
        --bad: #b42318;
        --warn: #9a6700;
      }

      body {
        margin: 0;
        background:
          radial-gradient(circle at 8% 8%, #dce6ff 0%, transparent 32%),
          radial-gradient(circle at 95% 0%, #e5f0ff 0%, transparent 30%),
          var(--bg);
        font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
        color: var(--ink);
      }

      .wrap {
        width: min(980px, 96vw);
        margin: 28px auto;
      }

      .header {
        background: linear-gradient(120deg, #0c256f, #12349c 70%, #2445b8);
        color: #fff;
        border-radius: 18px;
        box-shadow: 0 16px 34px rgba(15, 47, 147, 0.25);
        padding: 20px;
      }

      .header h1 {
        margin: 0;
        font-size: 1.35rem;
      }

      .header p {
        margin: 6px 0 0;
        color: #d8e3ff;
        font-size: 0.95rem;
      }

      .card {
        margin-top: 14px;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 16px;
        box-shadow: 0 10px 24px rgba(17, 24, 39, 0.08);
        padding: 20px;
      }

      .top-actions {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 12px;
      }

      .hint {
        color: var(--muted);
        font-size: 0.93rem;
      }

      .alert {
        padding: 10px 12px;
        border-radius: 10px;
        font-size: 0.94rem;
        display: none;
        margin-bottom: 12px;
      }

      .alert.error {
        background: #fdecec;
        color: #8f1f13;
        border: 1px solid #f8c9c4;
      }

      .alert.success {
        background: #e8f8ef;
        color: #146f3d;
        border: 1px solid #bae6cb;
      }

      .register-form {
        display: grid;
        gap: 14px;
      }

      fieldset {
        border: 1px solid var(--line);
        border-radius: 12px;
        margin: 0;
        padding: 14px;
      }

      legend {
        padding: 0 6px;
        font-weight: 700;
        color: #1d2939;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(220px, 1fr));
        gap: 12px;
      }

      .field {
        display: grid;
        gap: 6px;
      }

      .field.full {
        grid-column: 1 / -1;
      }

      .field label {
        font-size: 0.9rem;
        font-weight: 600;
        color: #293142;
      }

      .text-input,
      select.text-input {
        width: 100%;
        margin: 0;
        border: 1px solid #c9d5e8;
        border-radius: 10px;
        padding: 10px 11px;
        background: #fff;
      }

      .text-input:focus,
      select.text-input:focus {
        outline: none;
        border-color: #3b63d1;
        box-shadow: 0 0 0 3px rgba(59, 99, 209, 0.14);
      }

      .pwd-row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px;
      }

      .toggle {
        border: 1px solid #c9d5e8;
        border-radius: 10px;
        background: #fff;
        padding: 0 12px;
        font-weight: 600;
        cursor: pointer;
      }

      .checks {
        display: grid;
        gap: 4px;
        margin-top: 2px;
      }

      .check {
        font-size: 0.85rem;
        color: var(--muted);
      }

      .check.ok {
        color: var(--good);
      }

      .check.bad {
        color: var(--bad);
      }

      .form-actions {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }

      .next-links {
        display: none;
        gap: 10px;
        flex-wrap: wrap;
        margin-top: 8px;
      }

      @media (max-width: 720px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="header">
        <h1>Account Submission</h1>
        <p>Submit your profile for HR review and onboarding activation.</p>
      </section>

      <section class="card">
        <div class="top-actions">
          <span class="hint">Fields marked with * are required.</span>
        </div>

        <div id="alert-success" class="alert success"></div>
        <div id="alert-error" class="alert error"></div>

        <form id="registerForm" class="register-form" novalidate>
          <fieldset>
            <legend>Identity</legend>
            <div class="grid">
              <div class="field full">
                <label for="full_name">Full Name *</label>
                <input type="text" id="full_name" name="full_name" class="text-input" required />
              </div>
              <div class="field">
                <label for="email">Email *</label>
                <input type="email" id="email" name="email" class="text-input" autocomplete="email" required />
              </div>
              <div class="field">
                <label for="department">Department</label>
                <select id="department" name="department" class="text-input">
                  <option value="">Select department</option>
                </select>
              </div>
              <div class="field">
                <label for="job_title">Job Title</label>
                <select id="job_title" name="job_title" class="text-input">
                  <option value="">Select job title</option>
                </select>
              </div>
              <div class="field">
                <label for="role">Role *</label>
                <select id="role" name="role" class="text-input" required>
                  <option value="employee">Employee</option>
                  <option value="contractor">Contractor</option>
                  <option value="hr">HR</option>
                  <option value="it">IT</option>
                  <option value="compliance">Compliance</option>
                  <option value="manager">Project Manager</option>
                </select>
              </div>
            </div>
          </fieldset>

          <fieldset>
            <legend>Security</legend>
            <div class="grid">
              <div class="field">
                <label for="password">Password *</label>
                <div class="pwd-row">
                  <input type="password" id="password" name="password" class="text-input" autocomplete="new-password" required minlength="8" />
                  <button type="button" id="togglePw" class="toggle">Show</button>
                </div>
              </div>
              <div class="field">
                <label for="confirm_password">Confirm Password *</label>
                <div class="pwd-row">
                  <input type="password" id="confirm_password" name="confirm_password" class="text-input" autocomplete="new-password" required minlength="8" />
                  <button type="button" id="toggleConfirm" class="toggle">Show</button>
                </div>
              </div>
            </div>
            <div class="checks" id="passwordChecks">
              <div class="check" id="checkLen">At least 8 characters</div>
              <div class="check" id="checkMatch">Passwords match</div>
            </div>
          </fieldset>

          <div class="form-actions">
            <button type="submit" id="submitBtn" class="submit-button">Submit Account</button>
            <span id="submitState" class="hint"></span>
          </div>

          <div id="nextLinks" class="next-links">
            <a class="forgot-link" href="/upload_documents.html">Upload documents</a>
            <a class="forgot-link" href="/dashboard.html">View progress</a>
            <a class="forgot-link" href="/profile.html">My profile</a>
          </div>
        </form>
      </section>
    </main>

    <script>
      const form = document.getElementById("registerForm");
      const ok = document.getElementById("alert-success");
      const err = document.getElementById("alert-error");
      const submitBtn = document.getElementById("submitBtn");
      const submitState = document.getElementById("submitState");
      const nextLinks = document.getElementById("nextLinks");
      const departmentSelect = document.getElementById("department");
      const jobTitleSelect = document.getElementById("job_title");

      const passwordInput = document.getElementById("password");
      const confirmInput = document.getElementById("confirm_password");
      const checkLen = document.getElementById("checkLen");
      const checkMatch = document.getElementById("checkMatch");
      const togglePw = document.getElementById("togglePw");
      const toggleConfirm = document.getElementById("toggleConfirm");
      let orgDepartments = [];

      function show(el, message) {
        el.textContent = message;
        el.style.display = "block";
      }

      function hideAll() {
        ok.style.display = "none";
        err.style.display = "none";
      }

      function setLoading(isLoading) {
        submitBtn.disabled = isLoading;
        submitBtn.textContent = isLoading ? "Submitting..." : "Submit Account";
        submitState.textContent = isLoading ? "Sending profile to HR..." : "";
      }

      function setCheck(el, pass) {
        el.classList.remove("ok", "bad");
        el.classList.add(pass ? "ok" : "bad");
      }

      function updatePasswordChecks() {
        const pw = passwordInput.value || "";
        const confirm = confirmInput.value || "";
        const lenPass = pw.length >= 8;
        const matchPass = pw.length > 0 && pw === confirm;
        setCheck(checkLen, lenPass);
        setCheck(checkMatch, matchPass);
        return lenPass && matchPass;
      }

      function toggleVisibility(input, button) {
        const isPassword = input.type === "password";
        input.type = isPassword ? "text" : "password";
        button.textContent = isPassword ? "Hide" : "Show";
      }

      function setDepartmentOptions(selectedDepartment = "") {
        const selectedLower = (selectedDepartment || departmentSelect.value || "").toLowerCase();
        const options = ['<option value="">Select department</option>']
          .concat(
            orgDepartments.map((d) => {
              const selected = (d.name || "").toLowerCase() === selectedLower ? "selected" : "";
              return `<option value="${d.name}" ${selected}>${d.name}</option>`;
            })
          );
        departmentSelect.innerHTML = options.join("");
      }

      function setJobTitleOptions(selectedTitle = "") {
        const depName = (departmentSelect.value || "").toLowerCase();
        const dep = orgDepartments.find((d) => (d.name || "").toLowerCase() === depName);
        const titles = dep?.job_titles || [];
        const selectedLower = (selectedTitle || jobTitleSelect.value || "").toLowerCase();
        const options = ['<option value="">Select job title</option>']
          .concat(
            titles.map((t) => {
              const selected = (t.name || "").toLowerCase() === selectedLower ? "selected" : "";
              return `<option value="${t.name}" ${selected}>${t.name}</option>`;
            })
          );
        jobTitleSelect.innerHTML = options.join("");
      }

      async function loadOrgStructure() {
        const res = await fetch("/api/org/structure");
        if (!res.ok) return;
        const data = await res.json();
        orgDepartments = data.departments || [];
        setDepartmentOptions("");
        setJobTitleOptions("");
      }

      togglePw.addEventListener("click", () => toggleVisibility(passwordInput, togglePw));
      toggleConfirm.addEventListener("click", () => toggleVisibility(confirmInput, toggleConfirm));
      passwordInput.addEventListener("input", updatePasswordChecks);
      confirmInput.addEventListener("input", updatePasswordChecks);
      departmentSelect.addEventListener("change", () => setJobTitleOptions(""));
      updatePasswordChecks();
      loadOrgStructure();

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        hideAll();
        nextLinks.style.display = "none";

        if (!form.checkValidity()) {
          form.reportValidity();
          return;
        }

        if (!updatePasswordChecks()) {
          show(err, "Please satisfy password requirements before submitting.");
          return;
        }

        const payload = new URLSearchParams(new FormData(form));

        try {
          setLoading(true);
          const res = await fetch("/register", {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body: payload,
          });

          const text = await res.text();
          if (!res.ok) {
            show(err, text || "Account submission failed.");
            return;
          }

          show(ok, "Account submitted. HR will review your profile and activate onboarding access.");
          nextLinks.style.display = "flex";
          form.reset();
          updatePasswordChecks();
        } catch (_) {
          show(err, "Network or server error.");
        } finally {
          setLoading(false);
        }
      });
    </script>
  </body>
</html>
