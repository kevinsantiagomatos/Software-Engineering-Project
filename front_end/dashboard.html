<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Onboarding Dashboard</title>
    <link rel="stylesheet" href="/style/log_in.css" />
    <style>
      html {
        overflow-y: scroll;
        scrollbar-gutter: stable;
      }
      body { background:#f4f5f7; margin:0; font-family: 'Inter', system-ui, -apple-system, sans-serif; }
      .topbar { background: linear-gradient(135deg, #123093, #06133f); color:#fff; padding:16px 20px; display:flex; align-items:center; gap:12px; }
      .avatar { width:64px; height:64px; border-radius:16px; background:#1f2b58; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:1.5rem; color:#fff; }
      .container { max-width: 1100px; margin: 16px auto 0 auto; padding: 0 16px 32px; }
      .card { background:#fff; border-radius:16px; box-shadow:0 10px 30px rgba(0,0,0,0.08); padding:20px; margin-bottom:16px; min-width:0; }
      .steps { display:grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap:12px; align-items:stretch; }
      .step-link { display:block; height:100%; text-decoration:none; color:inherit; }
      .step {
        background:#f8fafc;
        border-radius:14px;
        padding:10px;
        border:1px solid #dce5f2;
        min-height:108px;
        height:100%;
        display:flex;
        flex-direction:column;
        justify-content:space-between;
        gap:6px;
        transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease;
        overflow:hidden;
      }
      .step-link:hover .step { transform:translateY(-2px); box-shadow:0 12px 26px rgba(2, 12, 27, 0.12); }
      .step.step-completed { border-color:#9bdfb8; background:linear-gradient(180deg, #f3fcf7, #f8fafc); }
      .step.step-in_progress { border-color:#f2d896; background:linear-gradient(180deg, #fffaf0, #f8fafc); }
      .step.step-pending { border-color:#dce5f2; background:linear-gradient(180deg, #f8fbff, #f8fafc); }
      .step-head { display:flex; align-items:center; justify-content:space-between; gap:8px; }
      .step .icon { width:34px; height:34px; border-radius:9px; display:inline-flex; align-items:center; justify-content:center; font-size:17px; box-shadow: inset 0 0 0 1px rgba(15,23,42,.07); }
      .step .label { font-weight:700; color:#0f172a; font-size:0.83rem; line-height:1.15; min-height:34px; }
      .step-note { color:#64748b; font-size:0.73rem; }
      .status-chip { display:inline-block; padding:3px 9px; border-radius:999px; font-size:0.72rem; border:1px solid transparent; font-weight:600; letter-spacing:.01em; }
      .status-chip.status-completed { background:#e7f8ef; color:#116f3d; border-color:#b8e6cb; }
      .status-chip.status-in_progress { background:#fff7e6; color:#8a5a00; border-color:#f3d396; }
      .status-chip.status-pending { background:#eef2f7; color:#485569; border-color:#d6deea; }
      .grid { display:grid; grid-template-columns: 1fr; gap:12px; }
      .grid-wide { display:grid; grid-template-columns: 1fr; gap:12px; }
      .list { list-style:none; padding:0; margin:0; }
      .list li { padding:10px 0; border-bottom:1px solid #e5e7eb; display:flex; justify-content:space-between; gap:12px; }
      .badge { display:inline-block; padding:4px 10px; border-radius:999px; font-size:0.85rem; background:#e5e7eb; color:#111827; }
      .muted { color:#4b5563; font-size:0.95rem; }
      .controls { display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-top:8px; }
      .text-input { width: 260px; }
      details { width:100%; }
      details summary { list-style:none; display:flex; align-items:center; gap:10px; cursor:pointer; padding:10px 0; font-weight:600; }
      details summary::-webkit-details-marker { display:none; }
      details .details-body { list-style:none; margin:0; padding:0; }
      .doc-row { padding:10px 0; border-bottom:1px solid #e2e8f0; display:flex; justify-content:space-between; gap:8px; align-items:center; }
      .doc-updated { color:#94a3b8; font-size:12px; }
      .action-btn {
        display:inline-flex;
        align-items:center;
        justify-content:center;
        gap:8px;
        min-height:42px;
        padding:0 14px;
        border-radius:10px;
        border:1px solid #cdd9ef;
        background: linear-gradient(180deg, #f8fbff, #eef4ff);
        color:#0f2f93;
        font-weight:700;
        text-decoration:none;
        box-shadow: 0 6px 14px rgba(15, 47, 147, 0.1);
        transition: transform .16s ease, box-shadow .16s ease, border-color .16s ease;
      }
      .action-btn:hover {
        transform: translateY(-1px);
        border-color:#9fb6ea;
        box-shadow: 0 10px 18px rgba(15, 47, 147, 0.16);
      }
      .process-card { min-height: 200px; padding-bottom: 28px; }
      .documents-card { display:flex; flex-direction:column; min-height:352px; overflow:hidden; }
      #docList {
        max-height:270px;
        width:100%;
        overflow-y: scroll;
        overflow-x: hidden;
        padding-right: 4px;
        scrollbar-gutter: stable;
        box-sizing: border-box;
      }
      #docList details,
      #docList summary,
      #docList .details-body,
      #docList .doc-row {
        max-width: 100%;
        width: 100%;
        box-sizing: border-box;
      }
      #docList summary > span { min-width: 0; }
      #docList .doc-row > div:first-child { min-width: 0; }
      #docList .doc-row > div:first-child > div,
      #docList .doc-row > div:first-child > .doc-updated { overflow-wrap:anywhere; }
      #docList .doc-row .badge { flex-shrink:0; white-space:nowrap; }
      @media (min-width: 840px) {
        .grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
        .grid-wide { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <div class="avatar" id="avatar">P</div>
      <div>
        <div style="font-weight:700; font-size:1.1rem;" id="fullName">Paoli Onboarding</div>
        <div id="joinInfo" style="font-size:0.95rem; color:#d7e4ff;">Joined in --/--/----</div>
      </div>
      <div style="margin-left:auto; position:relative;">
        <button id="menuBtn" class="submit-button" style="padding:10px 12px;">Menu ▾</button>
        <div id="menu" style="display:none; position:absolute; right:0; top:44px; background:#fff; border:1px solid #e5e7eb; border-radius:12px; box-shadow:0 10px 30px rgba(0,0,0,0.12); min-width:180px; z-index:10;"></div>
      </div>
    </header>

    <div class="container">
      <div class="card" style="margin-bottom:20px;">
        <div class="controls" id="emailControls">
          <input id="email" class="text-input" type="email" placeholder="Your email" />
          <button id="load" class="submit-button" style="padding:10px 16px;">Load</button>
        </div>
      </div>

      <div class="card process-card">
        <h3 style="margin-top:0;">New Hire Process</h3>
        <div class="steps" id="steps"></div>
      </div>

      <div class="grid">
        <div class="card">
          <h3>Progress</h3>
          <div id="progressStat" class="stat" style="font-size:1.5rem; color:#0b3c99;">--%</div>
          <div id="progressDetail" class="muted"></div>
        </div>
        <div class="card documents-card">
          <h3>Documents</h3>
          <ul id="docList" class="list"></ul>
        </div>
        <div class="card">
          <h3>Tasks</h3>
          <ul id="taskList" class="list"></ul>
        </div>
        <div class="card">
          <h3>Policies</h3>
          <div class="controls">
            <a class="action-btn policy-link" href="/policy_sign.html">Policy Acknowledgment</a>
          </div>
        </div>
        <div class="card">
          <h3>Training</h3>
          <div class="controls">
            <a class="action-btn training-link" href="/training.html">Training Modules</a>
          </div>
        </div>
      </div>

      <div class="grid-wide" id="directorySection" style="display:none;">
        <div class="card">
          <h3>People Directory</h3>
          <ul id="userList" class="list"></ul>
        </div>
        <div class="card">
          <h3>Policy & Training</h3>
          <div class="controls">
            <a class="forgot-link" id="policyLink" href="/policy_sign.html">Policy Acknowledgment</a>
            <a class="forgot-link" id="trainingLink" href="/training.html">Training Modules</a>
          </div>
        </div>
        <div class="card">
          <h3>New Hires</h3>
          <div class="controls">
            <input id="hireSearch" class="text-input" placeholder="Search name, email, department..." />
          </div>
          <ul id="hireList" class="list"></ul>
        </div>
      </div>
    </div>

    <script>
      const emailInput = document.getElementById("email");
      const loadBtn = document.getElementById("load");
      const progressStat = document.getElementById("progressStat");
      const progressDetail = document.getElementById("progressDetail");
      const docList = document.getElementById("docList");
      const taskList = document.getElementById("taskList");
      const uploadLink = null;
      const profileLink = null;
      const stepsEl = document.getElementById("steps");
      const fullNameEl = document.getElementById("fullName");
      const joinInfoEl = document.getElementById("joinInfo");
      const avatarEl = document.getElementById("avatar");
      const emailControls = document.getElementById("emailControls");
      const menuBtn = document.getElementById("menuBtn");
      const menu = document.getElementById("menu");
      let currentEmail = "";
      let currentRole = null; // viewer's role; set once from their own account
      const directorySection = document.getElementById("directorySection");
      const userList = document.getElementById("userList");
      const hireList = document.getElementById("hireList");
      const hireSearch = document.getElementById("hireSearch");
      let hiresData = [];
      const policyLinks = Array.from(document.querySelectorAll(".policy-link"));
      const trainingLinks = Array.from(document.querySelectorAll(".training-link"));

      function statusChip(status) {
        const label = String(status || "pending")
          .split("_")
          .map((part) => part.charAt(0).toUpperCase() + part.slice(1))
          .join(" ");
        return `<span class="status-chip status-${status}">${label}</span>`;
      }

      function renderDocs(requirements) {
        if (!requirements.length) {
          docList.innerHTML = "<li>No documents uploaded yet.</li>";
          return;
        }
        const required = requirements.filter((r) => !r.optional);
        const optional = requirements.filter((r) => r.optional);
        const requiredDone = required.filter((r) => r.status === "approved").length;
        const requiredTotal = required.length || 0;
        const optionalDone = optional.filter((r) => r.status === "approved").length;
        const optionalTotal = optional.length || 0;

        const pill = (status) => {
          const colors = { approved: "#d1fae5", pending_review: "#fef9c3", missing: "#f1f5f9", rejected: "#fee2e2" };
          const text = { approved: "#065f46", pending_review: "#92400e", missing: "#475569", rejected: "#991b1b" };
          const bg = colors[status] || "#e5e7eb";
          const fg = text[status] || "#475569";
          const label = status.replace("_", " ");
          return `<span class="badge" style="background:${bg}; color:${fg};">${label}</span>`;
        };

        const renderGroup = (items) =>
          items
            .map((r) => {
              const last = r.last_updated ? `<div class="doc-updated">Updated: ${r.last_updated}</div>` : "";
              return `<li class="doc-row">
                <div><div style="font-weight:600;">${r.label}${r.optional ? " (optional)" : ""}</div>${last}</div>
                ${pill(r.status || "missing")}
              </li>`;
            })
            .join("");

        const accordion = (title, count, total, bodyHtml, open = true) => {
          return `
            <li style="padding:6px 0; border-bottom:1px solid #e2e8f0;">
              <details ${open ? "open" : ""}>
                <summary><span class="caret" style="width:16px; display:inline-block; text-align:center;">${open ? "▾" : "▸"}</span><span style="flex:1;">${title}</span><span style="color:#475569; font-weight:500;">${count}/${total}</span></summary>
                <ul class="details-body">${bodyHtml}</ul>
              </details>
            </li>
          `;
        };

        const requiredHtml = accordion("Required documents", requiredDone, requiredTotal, renderGroup(required), true);
        const optionalHtml = optionalTotal ? accordion("Optional / Conditional", optionalDone, optionalTotal, renderGroup(optional), false) : "";

        docList.innerHTML = requiredHtml + optionalHtml;

        // Keep caret indicator in sync with details toggle
        docList.querySelectorAll("details").forEach((el) => {
          const caret = el.querySelector(".caret");
          el.addEventListener("toggle", () => {
            if (caret) caret.textContent = el.open ? "▾" : "▸";
          });
        });
      }

      function renderTasks(tasks) {
        if (!tasks.length) {
          taskList.innerHTML = "<li>No tasks assigned yet.</li>";
          return;
        }
        taskList.innerHTML = tasks
          .map(t => `<li style="padding:10px 0; border-bottom:1px solid #e2e8f0; display:flex; justify-content:space-between; gap:8px; align-items:center;"><div><strong>${t.title}</strong><br/><small>${t.description || ""}</small></div><span class="badge">${t.status}</span></li>`)
          .join("");
      }

      async function loadDirectory() {
        const role = (currentRole || "employee").toLowerCase();
        const isAdmin = ["hr", "compliance", "it", "manager"].includes(role);
        if (!isAdmin) {
          directorySection.style.display = "none";
          userList.innerHTML = "";
          hireList.innerHTML = "";
          return;
        }

        directorySection.style.display = "grid";
        try {
          const [data, progress, hires] = await Promise.all([
            fetchJson("/api/users"),
            fetchJson("/api/progress"),
            fetchJson("/api/new-hires")
          ]);
          const users = data.users || [];
          const progressByEmail = {};
          (progress.all || []).forEach(p => { progressByEmail[p.email] = p; });
          if (!users.length) {
            userList.innerHTML = "<li>No users found.</li>";
            return;
          }
          userList.innerHTML = users
            .map((u) => {
              const emailParam = u.email ? `?email=${encodeURIComponent(u.email)}` : "";
              const prog = progressByEmail[u.email] || { progress_percent: 0 };
              return `<li>
                <div><strong>${u.full_name || u.email}</strong><br/><small>${u.email || ""}</small></div>
                <div style="display:flex; gap:8px; align-items:center;">
                  <span class="badge">${u.role || "employee"}</span>
                  <span class="badge">${prog.progress_percent || 0}%</span>
                  <a class="forgot-link" href="/view_documents.html${emailParam}">Docs</a>
                  <a class="forgot-link" href="/upload_documents.html${emailParam}">Upload</a>
                </div>
              </li>`;
            })
            .join("");

          const hireItems = hires.hires || [];
          hiresData = hireItems;
          renderHireList();
        } catch (err) {
          const msg = err?.message || "Unable to load directory.";
          userList.innerHTML = `<li>${msg}</li>`;
          hireList.innerHTML = `<li>${msg}</li>`;
        }
      }

      function renderHireList() {
        const query = (hireSearch.value || "").toLowerCase();
        const filtered = hiresData.filter((h) => {
          if (!query) return true;
          const name = `${h.first_name || ""} ${h.last_name || ""}`.toLowerCase();
          const email = (h.email || "").toLowerCase();
          const dept = (h.department || "").toLowerCase();
          const role = (h.employment?.role || h.role || "").toLowerCase();
          return name.includes(query) || email.includes(query) || dept.includes(query) || role.includes(query);
        });

        hireList.innerHTML = filtered.length
          ? filtered
              .map((h) => {
                const em = h.email || "";
                const prog = h.progress || {};
                const pct = prog.progress_percent || 0;
                const stage = prog.stage || "Pending";
                const emailParam = em ? `?email=${encodeURIComponent(em)}` : "";
                return `<li>
                  <a href="/profile.html${emailParam}" style="flex:1; text-decoration:none; color:inherit;">
                    <div><strong>${h.first_name || ""} ${h.last_name || ""}</strong><br/><small>${em}</small><br/><small>${h.department || ""}</small></div>
                  </a>
                  <div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
                    <span class="badge">${stage}</span>
                    <span class="badge">${pct}%</span>
                    ${em ? `<a class="forgot-link" href="/view_documents.html${emailParam}">Docs</a>` : ""}
                  </div>
                </li>`;
              })
              .join("")
          : "<li>No new hires recorded.</li>";
      }

      function deriveStageStatus(docProgress, tasks) {
        const totalDocs = docProgress.total || 0;
        const approvedDocs = docProgress.approved || 0;
        const docsStatus = totalDocs && approvedDocs >= totalDocs ? "completed" : approvedDocs > 0 ? "in_progress" : "pending";
        const itTasks = tasks.filter(t => (t.category || "").toLowerCase() === "it" || t.id === "it_provision");
        const pmTasks = tasks.filter(t => (t.category || "").toLowerCase() === "manager");

        const itDone = itTasks.length && itTasks.every(t => t.status === "completed");
        const itStatus = itDone ? "completed" : itTasks.length ? "in_progress" : "pending";
        const pmDone = pmTasks.length && pmTasks.every(t => t.status === "completed");
        const pmStatus = pmDone ? "completed" : pmTasks.length ? "in_progress" : "pending";

        return {
          account: "completed",
          documents: docsStatus,
          it: itStatus,
          project: pmStatus
        };
      }

      function renderSteps(statuses) {
        const items = [
          { key: "account", label: "Account Created", icon: "👤", href: null },
          { key: "documents", label: "Document Filing and Submitting", icon: "📎", href: "/upload_documents.html" },
          { key: "it", label: "IT Access Configuration", icon: "🖥️", href: "/under_construction.html" },
          { key: "project", label: "Project Assignment and Orientation", icon: "✏️", href: "/under_construction.html" }
        ];
        stepsEl.innerHTML = items
          .map(item => {
            const st = statuses[item.key] || "pending";
            const iconBg = st === "completed" ? "#d1fae5" : st === "in_progress" ? "#fef9c3" : "#e5e7eb";
            const note = st === "completed" ? "Completed" : st === "in_progress" ? "Action in progress" : "Pending next step";
            const linkStart = item.href && (st === "in_progress" || st === "pending") ? `<a class="step-link" href="${item.href}${currentEmail ? `?email=${encodeURIComponent(currentEmail)}` : ""}">` : "";
            const linkEnd = linkStart ? "</a>" : "";
            return `
              ${linkStart}<div class="step step-${st}">
                <div class="step-head">
                  <div class="icon" style="background:${iconBg};">${item.icon}</div>
                  ${statusChip(st)}
                </div>
                <div class="label">${item.label}</div>
                <div class="step-note">${note}</div>
              </div>${linkEnd}
            `;
          })
          .join("");
      }

      async function loadUser(email) {
        try {
          const user = await fetchJson(`/api/user?email=${encodeURIComponent(email)}`);
          fullNameEl.textContent = user.full_name || email;
          joinInfoEl.textContent = user.created_at ? `Joined in ${new Date(user.created_at).toLocaleDateString()}` : "Onboarding";
          avatarEl.textContent = (user.full_name || email || "P").slice(0, 1).toUpperCase();
          if (user.avatar_url) {
            avatarEl.innerHTML = `<img src="${user.avatar_url}" alt="avatar" style="width:100%;height:100%;object-fit:cover;border-radius:16px;" />`;
          }
          if (!currentRole) {
            currentRole = (user.role || "employee").toLowerCase();
          }
          currentEmail = email;
          updateMenu();
        } catch (_) {
          fullNameEl.textContent = email;
          joinInfoEl.textContent = "Onboarding";
          avatarEl.textContent = (email || "P").slice(0,1).toUpperCase();
          if (!currentRole) {
            currentRole = "employee";
          }
          currentEmail = email;
          updateMenu();
        }
      }

      async function loadData() {
        const email = emailInput.value.trim().toLowerCase();
        if (!email) return;
        currentEmail = email;
        try {
          const [progress, reqs, tasks] = await Promise.all([
            fetchJson(`/api/progress?email=${encodeURIComponent(email)}`),
            fetchJson(`/documents/requirements?email=${encodeURIComponent(email)}`),
            fetchJson(`/api/tasks?email=${encodeURIComponent(email)}`)
          ]);

          progressStat.textContent = `${progress.progress_percent}%`;
          progressDetail.textContent = `${progress.documents.approved}/${progress.documents.total} docs approved, ${progress.tasks.completed}/${progress.tasks.total} tasks done.`;
          renderDocs(reqs.requirements || []);
          const baseTasks = tasks.tasks || [];
          const pseudoTasks = [
            { id: "policy_ack", title: "Sign company policies", description: "", status: progress.policies_signed ? "completed" : "pending" },
            { id: "training", title: "Complete onboarding training", description: "", status: progress.training_completed ? "completed" : "pending" },
            { id: "it_provision", title: "IT provisioning checklist", description: "", status: progress.it_provisioned ? "completed" : "pending" },
          ];
          const combinedTasks = [...baseTasks, ...pseudoTasks];
          renderTasks(combinedTasks);

          const statuses = deriveStageStatus(progress.documents || {}, combinedTasks);
          renderSteps(statuses);
          await loadUser(email);
          localStorage.setItem("paoli_email", email);
          updatePolicyTrainingLinks();
          loadDirectory();
        } catch (err) {
          progressStat.textContent = "--";
          progressDetail.textContent = err.message || "Unable to load data.";
          docList.innerHTML = "";
          taskList.innerHTML = "";
          stepsEl.innerHTML = "";
          directorySection.style.display = "none";
        }
      }

      loadBtn.addEventListener("click", loadData);
      hireSearch.addEventListener("input", renderHireList);

      async function fetchJson(url) {
        const res = await fetch(url, { headers: { Accept: "application/json" } });
        if (!res.ok) throw new Error(await res.text());
        const contentType = (res.headers.get("content-type") || "").toLowerCase();
        if (!contentType.includes("application/json")) {
          const text = await res.text();
          throw new Error(text || "Unexpected server response. Please log in again.");
        }
        return res.json();
      }

      function updatePolicyTrainingLinks() {
        const emailParam = currentEmail ? `?email=${encodeURIComponent(currentEmail)}` : "";
        policyLinks.forEach(a => { a.href = `/policy_sign.html${emailParam}`; });
        trainingLinks.forEach(a => { a.href = `/training.html${emailParam}`; });
      }

      function updateMenu() {
        const items = [];
        const emailParam = currentEmail ? `?email=${encodeURIComponent(currentEmail)}` : "";
        items.push(`<a class="forgot-link" style="display:block; padding:10px 12px;" href="/upload_documents.html${emailParam}">Upload documents</a>`);
        items.push(`<a class="forgot-link" style="display:block; padding:10px 12px;" href="/profile.html${emailParam}">My profile</a>`);
        const adminRoles = ["hr", "compliance", "it", "manager"];
        const role = currentRole || "employee";
        if (adminRoles.includes(role)) {
          items.push(`<a class="forgot-link" style="display:block; padding:10px 12px;" href="/admin_panel.html?role=${encodeURIComponent(role)}">Admin panel</a>`);
          items.push(`<a class="forgot-link" style="display:block; padding:10px 12px;" href="/hr_register.html">Register new hire</a>`);
        }
        items.push(`<a class="forgot-link" style="display:block; padding:10px 12px;" href="/policy_sign.html${emailParam}">Policy sign</a>`);
        items.push(`<a class="forgot-link" style="display:block; padding:10px 12px;" href="/training.html${emailParam}">Training</a>`);
        items.push(`<a class="forgot-link" style="display:block; padding:10px 12px;" href="/log_in.html">Log out</a>`);
        menu.innerHTML = items.join("");
      }

      menuBtn.addEventListener("click", () => {
        menu.style.display = menu.style.display === "block" ? "none" : "block";
      });
      document.addEventListener("click", (e) => {
        if (!menu.contains(e.target) && e.target !== menuBtn) {
          menu.style.display = "none";
        }
      });

      function prefillFromQuery() {
        const params = new URLSearchParams(window.location.search);
        const email = params.get("email") || localStorage.getItem("paoli_email");
        if (email) {
          emailInput.value = email;
          emailControls.style.display = "none";
          loadData();
        } else {
          emailControls.style.display = "flex";
        }
      }

      prefillFromQuery();
    </script>
  </body>
</html>
