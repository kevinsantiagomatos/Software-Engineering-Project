<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Metrics | Paoli</title>
    <link rel="stylesheet" href="/style/log_in.css" />
    <link rel="stylesheet" href="/style/pages/admin_metrics.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="avatar" id="avatar">M</div>
      <div>
        <div style="font-weight:700; font-size:1.08rem;" id="fullName">Admin Metrics</div>
        <div class="muted" id="roleLine" style="color:#d7e4ff;">--</div>
      </div>
      <div class="menu-wrap">
        <button id="menuBtn" class="submit-button menu-btn">Menu ▾</button>
        <div id="menuPanel" class="menu-panel">
          <a class="menu-link" id="menuSuperDashboard" href="/superadmin_dashboard.html" style="display:none;">Superadmin Console</a>
          <a class="menu-link" href="/admin_panel.html">Admin Dashboard</a>
          <a class="menu-link" href="/admin_metrics.html">Metrics</a>
          <a class="menu-link" id="profileLink" href="/profile.html">My Profile</a>
          <a class="menu-link" href="/dashboard.html">Employee View</a>
          <a class="menu-link" id="menuRegisterHire" href="/hr_register.html" style="display:none;">Register New Hire</a>
          <a class="menu-link" href="/log_in.html">Log Out</a>
        </div>
      </div>
    </header>

    <div class="container">
      <div id="alert"></div>
      <section class="card" style="margin-bottom:14px;">
        <h3 class="section-title">Filters & Export</h3>
        <div class="filter-grid">
          <select id="filterStage" class="text-input">
            <option value="">All stages</option>
            <option value="Account Setup">Account Setup</option>
            <option value="Documents">Documents</option>
            <option value="IT Access">IT Access</option>
            <option value="Training/Orientation">Training/Orientation</option>
            <option value="Compliance Review">Compliance Review</option>
            <option value="Project Assignment">Project Assignment</option>
            <option value="Completed">Completed</option>
          </select>
          <select id="filterStatus" class="text-input">
            <option value="">All statuses</option>
            <option value="pending_document_submission">Pending Document Submission</option>
            <option value="active">Active</option>
            <option value="completed">Completed</option>
          </select>
          <select id="filterEmployment" class="text-input">
            <option value="">All employment types</option>
            <option value="employee">Employee</option>
            <option value="contractor">Contractor</option>
          </select>
          <input id="filterDepartment" class="text-input" placeholder="Department contains..." />
          <input id="filterCreatedFrom" class="text-input" type="date" />
          <input id="filterCreatedTo" class="text-input" type="date" />
        </div>
        <div class="actions-row">
          <button id="applyFilters" class="submit-button" style="padding:10px 16px;">Apply</button>
          <button id="clearFilters" class="submit-button" style="padding:10px 16px; background:#334155;">Clear</button>
          <button id="exportCsv" class="submit-button" style="padding:10px 16px; background:#0f172a;">Export CSV</button>
          <button id="exportPdf" class="submit-button" style="padding:10px 16px; background:#1d4ed8;">Export PDF</button>
          <span id="rowCount" class="muted" style="margin-left:auto;">Rows: --</span>
        </div>
      </section>
      <div class="grid" id="kpiGrid"></div>

      <div class="grid" style="margin-top:16px; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));">
        <section class="card">
          <h3 class="section-title">Stage Distribution</h3>
          <div id="stageDist" class="bar-list"></div>
        </section>
        <section class="card">
          <h3 class="section-title">Status Distribution</h3>
          <div id="statusDist" class="bar-list"></div>
        </section>
        <section class="card">
          <h3 class="section-title">Employment Type</h3>
          <div id="employmentDist" class="bar-list"></div>
        </section>
        <section class="card">
          <h3 class="section-title">Compliance Distribution</h3>
          <div id="complianceDist" class="bar-list"></div>
        </section>
      </div>
    </div>

    <script>
      const ADMIN_ROLES = ["admin", "manager", "superadmin", "hr", "it", "compliance"];
      const alertEl = document.getElementById("alert");
      const fullNameEl = document.getElementById("fullName");
      const roleLineEl = document.getElementById("roleLine");
      const avatarEl = document.getElementById("avatar");
      const menuBtn = document.getElementById("menuBtn");
      const menuPanel = document.getElementById("menuPanel");
      const menuSuperDashboard = document.getElementById("menuSuperDashboard");
      const profileLink = document.getElementById("profileLink");
      const menuRegisterHire = document.getElementById("menuRegisterHire");
      const kpiGrid = document.getElementById("kpiGrid");
      const stageDist = document.getElementById("stageDist");
      const statusDist = document.getElementById("statusDist");
      const employmentDist = document.getElementById("employmentDist");
      const complianceDist = document.getElementById("complianceDist");
      const filterStage = document.getElementById("filterStage");
      const filterStatus = document.getElementById("filterStatus");
      const filterEmployment = document.getElementById("filterEmployment");
      const filterDepartment = document.getElementById("filterDepartment");
      const filterCreatedFrom = document.getElementById("filterCreatedFrom");
      const filterCreatedTo = document.getElementById("filterCreatedTo");
      const applyFiltersBtn = document.getElementById("applyFilters");
      const clearFiltersBtn = document.getElementById("clearFilters");
      const exportCsvBtn = document.getElementById("exportCsv");
      const exportPdfBtn = document.getElementById("exportPdf");
      const rowCountEl = document.getElementById("rowCount");

      let sessionInfo = null;

      function showAlert(msg, isError=false) {
        alertEl.textContent = msg;
        alertEl.className = isError ? "err" : "ok";
        alertEl.style.display = "block";
      }

      async function fetchJson(url) {
        const res = await fetch(url, { headers: { Accept: "application/json" } });
        if (res.status === 401 || res.status === 403 || (res.redirected && (res.url || "").includes("/log_in.html"))) {
          window.location.replace("/log_in.html");
          throw new Error("Authentication required");
        }
        if (!res.ok) throw new Error(await res.text());
        return res.json();
      }

      function titleize(s) {
        return String(s || "")
          .split(/[_\s]+/)
          .filter(Boolean)
          .map((p) => p.charAt(0).toUpperCase() + p.slice(1))
          .join(" ");
      }

      function buildFilterQuery(withFormat = "") {
        const params = new URLSearchParams();
        if (filterStage.value) params.set("stage", filterStage.value);
        if (filterStatus.value) params.set("status", filterStatus.value);
        if (filterEmployment.value) params.set("employment_type", filterEmployment.value);
        if (filterDepartment.value.trim()) params.set("department", filterDepartment.value.trim());
        if (filterCreatedFrom.value) params.set("created_from", filterCreatedFrom.value);
        if (filterCreatedTo.value) params.set("created_to", filterCreatedTo.value);
        if (withFormat) params.set("format", withFormat);
        return params.toString();
      }

      function renderKPIs(m) {
        const totals = m.totals || {};
        const kpis = m.kpis || {};
        const tiles = [
          ["New Hires", totals.new_hires || 0],
          ["Docs Approved", totals.documents_approved || 0],
          ["Docs Pending", totals.documents_pending_review || 0],
          ["Tasks Completed", totals.tasks_completed || 0],
          ["Compliance Approved", totals.compliance_approved_hires || 0],
          ["Compliance Flagged", totals.compliance_flagged_hires || 0],
          ["Avg Progress", `${kpis.average_progress_percent || 0}%`],
          ["Avg Days In Pipeline", kpis.average_days_since_hire_created || 0],
        ];
        kpiGrid.innerHTML = tiles.map(([label, value]) => `
          <div class="card">
            <div class="kpi-label">${label}</div>
            <div class="kpi-value">${value}</div>
          </div>
        `).join("");
      }

      function renderDistribution(el, dataObj) {
        const entries = Object.entries(dataObj || {});
        if (!entries.length) {
          el.innerHTML = '<div class="muted">No data available.</div>';
          return;
        }
        const total = entries.reduce((a, [,v]) => a + Number(v || 0), 0) || 1;
        el.innerHTML = entries
          .sort((a,b) => Number(b[1]||0) - Number(a[1]||0))
          .map(([k,v]) => {
            const n = Number(v || 0);
            const pct = Math.round((n / total) * 100);
            return `
              <div class="bar-row">
                <div class="muted">${titleize(k)}</div>
                <div class="bar-track"><div class="bar-fill" style="width:${pct}%;"></div></div>
                <div style="text-align:right; font-weight:700;">${n}</div>
              </div>
            `;
          }).join("");
      }

      async function loadMetrics() {
        const qs = buildFilterQuery();
        const url = `/api/admin/metrics${qs ? `?${qs}` : ""}`;
        const metrics = await fetchJson(url);
        renderKPIs(metrics);
        renderDistribution(stageDist, metrics.distribution?.stage || {});
        renderDistribution(statusDist, metrics.distribution?.status || {});
        renderDistribution(employmentDist, metrics.distribution?.employment_type || {});
        renderDistribution(complianceDist, metrics.distribution?.compliance || {});
        rowCountEl.textContent = `Rows: ${metrics.rows_count || 0}`;
        showAlert("Metrics loaded.");
      }

      async function bootstrap() {
        try {
          sessionInfo = await fetchJson("/api/session");
          const role = (sessionInfo.role || "").toLowerCase();
          const email = (sessionInfo.email || "").toLowerCase();
          if (!ADMIN_ROLES.includes(role)) {
            window.location.replace(`/dashboard.html?email=${encodeURIComponent(email)}`);
            return;
          }

          fullNameEl.textContent = `${sessionInfo.full_name || sessionInfo.email} · Metrics`;
          roleLineEl.textContent = `Role: ${role} · ${sessionInfo.email || ""}`;
          avatarEl.textContent = (sessionInfo.full_name || sessionInfo.email || "M").slice(0,1).toUpperCase();
          profileLink.href = `/profile.html?email=${encodeURIComponent(email)}`;
          menuSuperDashboard.style.display = role === "superadmin" ? "block" : "none";
          menuRegisterHire.style.display = role === "hr" || role === "manager" ? "block" : "none";

          await loadMetrics();
        } catch (err) {
          showAlert(err.message || "Unable to load metrics.", true);
        }
      }

      applyFiltersBtn.addEventListener("click", async () => {
        try {
          await loadMetrics();
        } catch (err) {
          showAlert(err.message || "Unable to apply filters.", true);
        }
      });

      clearFiltersBtn.addEventListener("click", async () => {
        filterStage.value = "";
        filterStatus.value = "";
        filterEmployment.value = "";
        filterDepartment.value = "";
        filterCreatedFrom.value = "";
        filterCreatedTo.value = "";
        try {
          await loadMetrics();
        } catch (err) {
          showAlert(err.message || "Unable to reset filters.", true);
        }
      });

      exportCsvBtn.addEventListener("click", () => {
        const qs = buildFilterQuery("csv");
        window.location.href = `/api/admin/metrics/export${qs ? `?${qs}` : ""}`;
      });

      exportPdfBtn.addEventListener("click", () => {
        const qs = buildFilterQuery("pdf");
        window.location.href = `/api/admin/metrics/export${qs ? `?${qs}` : ""}`;
      });

      menuBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        menuPanel.classList.toggle("open");
      });
      document.addEventListener("click", (e) => {
        if (!menuPanel.contains(e.target) && e.target !== menuBtn) {
          menuPanel.classList.remove("open");
        }
      });

      bootstrap();
    </script>
  </body>
</html>
