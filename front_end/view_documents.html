<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document Status</title>
    <link rel="stylesheet" href="/style/log_in.css" />
    <style>
      body { background:#f7f7f9; margin:0; font-family: 'Inter', system-ui, -apple-system, sans-serif; }
      .topbar { background: linear-gradient(135deg, #123093, #06133f); color:#fff; padding:12px 16px; display:flex; align-items:center; gap:12px; }
      .avatar { width:56px; height:56px; border-radius:14px; background:#1f2b58; display:flex; align-items:center; justify-content:center; font-size:24px; color:#fff; overflow:hidden; }
      .container { max-width: 820px; margin: -20px auto 24px auto; padding: 0 12px; }
      .card { background:#fff; border-radius:16px; box-shadow:0 10px 30px rgba(0,0,0,0.08); padding:16px; margin-bottom:16px; }
      .doc-item { border:1px dashed #d9e1ec; border-radius:12px; padding:10px 12px; margin:8px 0; display:flex; justify-content:space-between; align-items:center; background:#fdfefe; }
      .status { font-weight:600; }
    </style>
  </head>
  <body>
    <header class="topbar">
      <div class="avatar" id="avatar">P</div>
      <div>
        <div style="font-weight:700;" id="fullName">Document Status</div>
        <div id="emailLabel" style="color:#d7e4ff; font-size:0.95rem;"></div>
      </div>
      <a href="javascript:history.back()" class="forgot-link" style="color:#d7e4ff; margin-left:auto;">← Go back</a>
    </header>

    <div class="container">
      <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <div>
            <div style="font-weight:700;">Document and Form Submission</div>
            <div class="muted">Track each required file and status.</div>
          </div>
          <a class="forgot-link" href="/upload_documents.html" id="uploadLink">Upload</a>
        </div>
        <div id="list"></div>
      </div>
    </div>

    <script>
      const listEl = document.getElementById("list");
      const emailLabel = document.getElementById("emailLabel");
      const fullNameEl = document.getElementById("fullName");
      const avatarEl = document.getElementById("avatar");
      const uploadLink = document.getElementById("uploadLink");
      let email = "";

      async function fetchJson(url) {
        const res = await fetch(url);
        if (!res.ok) throw new Error(await res.text());
        return res.json();
      }

      function render(items) {
        listEl.innerHTML = items
          .map((item) => {
            const approved = item.status === "approved";
            const color = approved ? "#16a34a" : item.status === "pending_review" ? "#92400e" : "#475569";
            const icon = approved ? "✔" : "✕";
            const status = item.status === "missing" ? "Not uploaded" : item.status.replace("_", " ");
            return `<div class="doc-item"><div><div style="font-weight:600;">${item.label}</div></div><div class="status" style="color:${color};">${icon} ${status}</div></div>`;
          })
          .join("");
      }

      async function load() {
        const params = new URLSearchParams(window.location.search);
        email = params.get("email") || localStorage.getItem("paoli_email") || "";
        if (!email) {
          listEl.innerHTML = "<p>Please provide an email.</p>";
          return;
        }
        emailLabel.textContent = email;
        uploadLink.href = `/upload_documents.html?email=${encodeURIComponent(email)}`;
        try {
          const [reqs, user] = await Promise.all([
            fetchJson(`/documents/requirements?email=${encodeURIComponent(email)}`),
            fetchJson(`/api/user?email=${encodeURIComponent(email)}`).catch(() => ({}))
          ]);
          render(reqs.requirements || []);
          fullNameEl.textContent = (user.full_name || email || "User");
          avatarEl.textContent = (user.full_name || email || "P").slice(0,1).toUpperCase();
          if (user.avatar_url) {
            avatarEl.innerHTML = `<img src="${user.avatar_url}" alt="avatar" style="width:100%; height:100%; object-fit:cover; border-radius:14px;" />`;
          }
        } catch (err) {
          listEl.innerHTML = `<p>${err.message}</p>`;
        }
      }

      load();
    </script>
  </body>
</html>
