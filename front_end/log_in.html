<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Paoli Group | Log In</title>
    <link rel="stylesheet" href="/style/log_in.css" />
  </head>
  <body>
    <header class="page-header">
      <div class="header-gradient"></div>
    </header>

    <main class="login-page">
      <section class="brand-panel">
        <div class="brand-emblem">
          <img src="/assets/paoli_logo.png" alt="Paoli Group logo" />
        </div>
        <p class="brand-name">Paoli Group</p>
      </section>

      <section class="form-panel">
        <form action="/login" method="POST" class="login-form">
          <div id="loginAlert" class="login-alert" style="display:none;"></div>
          <label class="input-label" for="username">Username</label>
          <input
            type="text"
            id="username"
            name="username"
            class="text-input"
            autocomplete="username"
            required
          />

          <label class="input-label" for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            class="text-input"
            autocomplete="current-password"
            required
          />

          <div class="form-actions" style="justify-content:flex-end;">
            <button type="submit" class="submit-button">Log In</button>
          </div>
        </form>
      </section>
    </main>

    <footer class="page-footer">
      <div class="footer-left">
        <div class="footer-logo">
          <img src="/assets/paoli_logo.png" alt="Paoli Group logo" />
        </div>
        <span class="footer-text">Paoli Group</span>
      </div>
      <div class="footer-right">© 2025 Paoli Group. All rights reserved.</div>
    </footer>
    <script>
      (function () {
        const params = new URLSearchParams(window.location.search);
        const alertEl = document.getElementById("loginAlert");
        const error = params.get("error");
        const reset = params.get("reset");
        if (!alertEl) return;
        const form = document.querySelector("form.login-form");
        if (form) {
          form.addEventListener("submit", () => {
            try { sessionStorage.setItem("paoli_login_success_pending", "1"); } catch (_) {}
          });
        }
        if (error === "invalid_credentials") {
          alertEl.textContent = "Invalid username or password. Please try again.";
          alertEl.className = "login-alert login-alert-error";
          alertEl.style.display = "block";
          return;
        }
        if (reset === "ok") {
          alertEl.textContent = "Password updated. You can log in now.";
          alertEl.className = "login-alert login-alert-success";
          alertEl.style.display = "block";
        }
      })();
    </script>
  </body>
</html>
