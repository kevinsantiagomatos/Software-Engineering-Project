<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Documents Submitted</title>
    <link rel="stylesheet" href="/style/log_in.css" />
    <style>
      body { background: linear-gradient(180deg, #0b3c99 0%, #0b3c99 8%, #f7f7f9 8%, #f7f7f9 100%); min-height: 100vh; display:flex; flex-direction:column; }
      .wrapper { flex:1; display:flex; align-items:center; justify-content:center; text-align:center; padding:24px; }
      .card { background:#fff; padding:32px 24px; border-radius:16px; box-shadow:0 10px 30px rgba(0,0,0,0.08); max-width:520px; width:100%; }
      .check { font-size:56px; color:#0b3c99; margin-top:16px; }
      .footer { padding:16px 24px; display:flex; justify-content:space-between; align-items:center; color:#4b5563; font-size:0.95rem; }
    </style>
  </head>
  <body>
    <a href="/upload_documents.html" class="forgot-link" style="color:#d7e4ff; padding:12px 16px; display:inline-block;">← Go back</a>
    <div class="wrapper">
      <div class="card">
        <h1 style="margin:0; color:#0b3c99;">The documents have been submitted!</h1>
        <p style="margin:12px 0 0 0; font-size:1.1rem; color:#111827;">Thank you!</p>
        <div class="check">✔</div>
        <div style="margin-top:16px; display:flex; gap:12px; justify-content:center; flex-wrap:wrap;">
          <a class="submit-button" href="/dashboard.html">Go to Dashboard</a>
          <a class="submit-button" href="/log_in.html" style="background:#eef2ff; color:#0b3c99;">Log in</a>
        </div>
      </div>
    </div>
    <div class="footer">
      <div style="display:flex; align-items:center; gap:8px;">
        <img src="/assets/paoli_logo.png" alt="Paoli Group logo" style="width:30px; height:30px;" />
        <span>Paoli Group</span>
      </div>
      <div>© 2025 Paoli Group. All rights reserved.</div>
    </div>
  </body>
</html>
